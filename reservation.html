<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Cafe - Reservation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Lora', serif; 
      background-color: #4a3220; 
      color: #fdfaf6; 
    }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #6b4423 !important; }
    h1, h2 { font-family: 'Playfair Display', serif; color: #fdfaf6; }
    .form-label { color: #fdfaf6; font-weight: 600; }
    .btn-coffee { background-color: #8b5a2b; color: white; border: none; }
    .btn-coffee:hover { background-color: #a06b3a; color: white; }
    .form-control, .form-select { 
      background-color: #5c3e28; 
      border: 1px solid #8b5a2b;
      color: #fdfaf6;
    }
    .form-control:focus, .form-select:focus {
      background-color: #5c3e28;
      border-color: #d4a574;
      box-shadow: 0 0 0.25rem rgba(212, 165, 116, 0.5);
      color: #fdfaf6;
    }
    .card { background-color: #5c3e28; border: 1px solid #8b5a2b; }
    footer { background-color: #3a2518; color: #fdfaf6; }
    .lead { color: #e8dcc8; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">Local Cafe</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservation.html">Reservation</a></li>
          <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="text-center py-5">
    <div class="container">
      <h1 class="display-5 mb-2">Book a Table</h1>
      <p class="lead">Planning to visit us? Fill the form below!</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          
          <div class="card shadow border-0 p-4">
            <h2 class="h5 mb-4 text-center">Reserve Your Spot</h2>
            <form>
              
              <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="name" required>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="date" class="form-label">Date</label>
                  <input type="date" class="form-control" id="date" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="time" class="form-label">Time</label>
                  <input type="time" class="form-control" id="time" required>
                </div>
              </div>

              <div class="mb-4">
                <label for="guests" class="form-label">Number of Guests</label>
                <select class="form-select" id="guests" required>
                  <option selected disabled value="">Choose...</option>
                  <option>1 Person</option>
                  <option>2 People</option>
                  <option>3 People</option>
                  <option>4 People</option>
                  <option>5 People</option>
                  <option>6+ People</option>
                </select>
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-coffee btn-lg">Book Now</button>
              </div>

              <p class="text-center mb-0" style="color: #d4c4b0;">
                We are excited to serve you!
              </p>

            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="py-4 text-center">
    <div class="container">
      <p class="mb-0">&copy; 2026; local cafe</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
      </html>
