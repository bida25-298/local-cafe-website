<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Cafe - Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Lora', serif; 
      background-color: #4a3220; /* DARK BROWN */
      color: #fdfaf6; /* Light text */
    }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #6b4423 !important; }
    h1, h2 { font-family: 'Playfair Display', serif; color: #fdfaf6; }
    .form-label { color: #fdfaf6; font-weight: 600; }
    .btn-coffee { background-color: #8b5a2b; color: white; border: none; }
    .btn-coffee:hover { background-color: #a06b3a; color: white; }
    .form-control, .form-select { 
      background-color: #5c3e28; 
      border: 1px solid #8b5a2b;
      color: #fdfaf6;
    }
    .form-control::placeholder { color: #d4c4b0; }
    .form-control:focus, .form-select:focus {
      background-color: #5c3e28;
      border-color: #d4a574;
      box-shadow: 0 0 0.25rem rgba(212, 165, 116, 0.5);
      color: #fdfaf6;
    }
    .card { background-color: #5c3e28; border: 1px solid #8b5a2b; }
    .contact-box { 
      background-color: #5c3e28; 
      border: 1px solid #8b5a2b;
      border-radius: 0.375rem;
    }
    .contact-box a { color: #d4a574; text-decoration: none; }
    .contact-box a:hover { color: #e8dcc8; text-decoration: underline; }
    footer { background-color: #3a2518; color: #fdfaf6; }
    .lead { color: #e8dcc8; }
    hr { border-color: #8b5a2b; opacity: 0.5; }
  </style>
</head>
<body>

  <!-- Navbar stays light for contrast -->
  <nav class="navbar navbar-expand-lg bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">Local Cafe</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="reservation.html">Reservation</a></li>
          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="text-center py-5">
    <div class="container">
      <h1 class="display-5 mb-2">Give Us Feedback</h1>
      <p class="lead">Tell us how we did — we read every message</p>
    </div>
  </section>

  <!-- Contact + Form -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          
          <!-- Contact Info Box -->
          <div class="contact-box p-4 mb-4 text-center">
            <h2 class="h5 mb-3">Other ways to reach us</h2>
            <p class="mb-2">
              Email: <a href="mailto:bida25-298@thuto.bac.ac.bw.com">bida25-298@thuto.bac.ac.bw.com</a>
            </p>
            <p class="mb-2">Plot 123, Mainmall Gaborone</p>
            <p class="mb-0">Call: <a href="tel:+26774035717">+267 74035717</a></p>
          </div>

          <hr class="my-4">

          <!-- Form Card -->
          <div class="card shadow border-0 p-4">
            <h2 class="h5 mb-3 text-center">Or send a quick message</h2>
            <form>
              
              <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="name">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email">
              </div>

              <div class="mb-3">
                <label for="visit" class="form-label">When did you visit?</label>
                <input type="date" class="form-control" id="visit">
              </div>

              <div class="mb-3">
                <label for="rating" class="form-label">Rate your experience</label>
                <select class="form-select" id="rating" required>
                  <option selected disabled value="">Choose...</option>
                  <option>5 - Amazing!</option>
                  <option>4 - Pretty good</option>
                  <option>3 - It was okay</option>
                  <option>2 - Could be better</option>
                  <option>1 - Not great</option>
                </select>
              </div>

              <div class="mb-4">
                <label for="message" class="form-label">Your Message</label>
                <textarea class="form-control" id="message">
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-coffee btn-lg">Send Feedback</button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-4 text-center">
    <div class="container">
      <p class="mb-0">&copy; 2026 Local Cafe, All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
