<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Cafe Coffee Shop - Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #f5f5dc;
        }
        .navbar-brand {
            font-size: 2rem;
            font-weight: bold;
            color: #8B5E3C !important;
        }
        .nav-link {
            font-size: 1.2rem;
            color: #333 !important;
        }
        .nav-link:hover {
            color: #8B5E3C !important;
        }
        h1 {
            text-align: center;
            color: #4b2e2e;
            padding: 30px 0 20px 0;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Local Cafe</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">Feedback</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1>Gallery</h1>
    <div class="gallery">
        <img src="images/americano.jpg" alt="Americano" loading="lazy">
        <img src="images/latte.jpg" alt="Latte" loading="lazy">
        <img src="images/cappuccino.jpg" alt="Cappuccino" loading="lazy">
        <img src="images/muffin.jpg" alt="Muffin" loading="lazy">
        <img src="images/sandwich.jpg" alt="Sandwich" loading="lazy">
        <img src="images/cakeslice.jpg" alt="Cake Slice" loading="lazy">
        <img src="images/coke.jpg" alt="Coke" loading="lazy">
        <img src="images/fanta.jpg" alt="Fanta" loading="lazy">
        <img src="images/juice.jpg" alt="Juice" loading="lazy">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
