<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Cafe's Coffee Shop - Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5dc;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #4b2e2e;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .item h3 {
            margin: 10px 0 5px 0;
            color: #4b2e2e;
        }
        .price {
            font-weight: bold;
            color: #8B4513;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h>Local Cafe's Coffee Shop Menu</h1>
    <div class="menu">
        <div class="item">
            <img src="images/americano.jpg" alt="Americano">
            <h3>Americano</h3>
            <p class="price">P28</p>
        </div>
        <div class="item">
            <img src="images/latte.jpg" alt="Latte">
            <h3>Latte</h3>
            <p class="price">P28</p>
        </div>
        <div class="item">
            <img src="images/cappuccino.jpg" alt="Cappuccino">
            <h3>Cappuccino</h3>
            <p class="price">P32</p>
        </div>
        <div class="item">
            <img src="images/muffin.jpg" alt="Muffin">
            <h3>Muffin</h3>
            <p class="price">P25</p>
        </div>
        <div class="item">
            <img src="images/sandwich.jpg" alt="Sandwich">
            <h3>Sandwich</h3>
            <p class="price">P45</p>
        </div>
        <div class="item">
            <img src="images/cakeslice.jpg" alt="Cake Slice">
            <h3>Cake Slice</h3>
            <p class="price">P30</p>
        </div>
        <div class="item">
            <img src="images/coke.jpg" alt="Coke">
            <h3>Coke</h3>
            <p class="price">P18</p>
        </div>
        <div class="item">
            <img src="images/fanta.jpg" alt="Fanta">
            <h3>Fanta</h3>
            <p class="price">P18</p>
        </div>
        <div class="item">
            <img src="images/juice.jpg" alt="Juice">
            <h3>Juice</h3>
            <p class="price">P20</p>
        </div>
    </div>
</body>
</html>
