<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Cafe Coffee Shop - Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5dc;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #4b2e2e;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #f5f5dc;
        }
        h1 {
            text-align: center;
            color: #4b2e2e;
            padding: 20px 0 10px 0;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }
        .item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .item h3 {
            margin: 10px 0 5px 0;
            color: #4b2e2e;
        }
        .price {
            font-weight: bold;
            color: #8B4513;
            font-size: 18px;
        }
        footer {
            background-color: #4b2e2e;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="reservation.html">Reservation</a>
        <a href="feedback.html">Feedback</a>
    </nav>

    <h1>Pearl's Coffee Shop Menu</h1>
    <div class="menu">
        <div class="item">
            <img src="images/americano.jpg" alt="Americano" loading="lazy">
            <h3>Americano</h3>
            <p class="price">P28</p>
        </div>
        <div class="item">
            <img src="images/latte.jpg" alt="Latte" loading="lazy">
            <h3>Latte</h3>
            <p class="price">P28</p>
        </div>
        <div class="item">
            <img src="images/cappuccino.jpg" alt="Cappuccino" loading="lazy">
            <h3>Cappuccino</h3>
            <p class="price">P32</p>
        </div>
        <div class="item">
            <img src="images/muffin.jpg" alt="Muffin" loading="lazy">
            <h3>Muffin</h3>
            <p class="price">P25</p>
        </div>
        <div class="item">
            <img src="images/sandwich.jpg" alt="Sandwich" loading="lazy">
            <h3>Sandwich</h3>
            <p class="price">P45</p>
        </div>
        <div class="item">
            <img src="images/cakeslice.jpg" alt="Cake Slice" loading="lazy">
            <h3>Cake Slice</h3>
            <p class="price">P30</p>
        </div>
        <div class="item">
            <img src="images/coke.jpg" alt="Coke" loading="lazy">
            <h3>Coke</h3>
            <p class="price">P18</p>
        </div>
        <div class="item">
            <img src="images/fanta.jpg" alt="Fanta" loading="lazy">
            <h3>Fanta</h3>
            <p class="price">P18</p>
        </div>
        <div class="item">
            <img src="images/juice.jpg" alt="Juice" loading="lazy">
            <h3>Juice</h3>
            <p class="price">P20</p>
        </div>
    </div>

    <footer>
        <p>© 2025 Local Cafe Shop | Est. 2026</p>
    </footer>
</body>
            </html>
